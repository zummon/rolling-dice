<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpine.js</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.4"></script>
  </head>
  <body class="bg-[#3e5656] text-white">
    <div
      class="flex flex-col items-center"
      x-data="{
				dices: ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'],
				multiple: 2,
				get ranNums () {
					console.log('rolling')
					return Array.from({ length: this.multiple }).map(() => {
						return Math.floor(Math.random() * this.dices.length);
					});
				},
			}"
    >
      <div class="flex w-fit mx-auto py-8 font-mono">
        <button
          class="text-4xl px-3 py-2 text-[#b0725d] bg-white"
          @click="() => {
						multiple++;
						multiple--;
					}"
        >
          Roll
        </button>
        <input
          class="w-16 text-4xl text-center text-[#b0725d] bg-white"
          type="number"
          title="How many dices?"
          x-model="multiple"
          min="1"
          max="99"
        />
      </div>

      <div class="bg-[#b0725d] container mx-auto">
        <div class="flex flex-wrap gap-x-8 gap-y-4 justify-center cursor-default px-4 py-8">
          <template x-for="ranNum in ranNums">
            <div class="text-8xl" x-text="dices[ranNum]"></div>
          </template>
        </div>
        <div class="text-center font-semibold">
          Score <span x-text="ranNums.reduce((prev, curr) => prev + curr + 1, 0)"></span> Error
          <span x-text="ranNums"></span>
        </div>
      </div>
    </div>
    <div class="text-center py-8">
      Made by zummon (Teerapat Anantarattanachai)<br />
      Something breaks, needs upgrade. Let me know
    </div>
  </body>
</html>
